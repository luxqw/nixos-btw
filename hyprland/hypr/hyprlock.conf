general {
    hide_cursor = true
    grace       = 2
}

background {
    monitor     =
    path        = /home/lux/Documents/walls/wall1.jpg
    blur_passes = 2
    blur_size   = 4
    brightness  = 0.6
}

# Clock
label {
    monitor     =
    text        = cmd[update:1000] echo "$(date +"%H:%M")"
    font_size   = 80
    font_family = Iosevka NF Bold
    color       = rgba(c0caf5ff)
    position    = 0, 120
    halign      = center
    valign      = center
}

# Date
label {
    monitor     =
    text        = cmd[update:60000] echo "$(date +"%A, %d %B")"
    font_size   = 20
    font_family = Iosevka NF
    color       = rgba(a9b1d6cc)
    position    = 0, 40
    halign      = center
    valign      = center
}

# Password field
input-field {
    monitor           =
    size              = 320, 52
    outline_thickness = 3
    dots_size         = 0.3
    dots_spacing      = 0.2
    outer_color       = rgb(7aa2f7)
    inner_color       = rgb(1a1b26)
    font_color        = rgb(c0caf5)
    fade_on_empty     = true
    placeholder_text  = <span foreground="##565f89">Password</span>
    rounding          = 10
    position          = 0, -60
    halign            = center
    valign            = center
    check_color       = rgb(9ece6a)
    fail_color        = rgb(f7768e)
    fail_text         = <span foreground="##f7768e">$FAIL <b>($ATTEMPTS)</b></span>
}
